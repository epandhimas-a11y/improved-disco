<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<meta name="theme-color" content="#0d0d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Courier New', monospace; }
    body { background:#0d0d1a; color:#fff; padding:20px; }
    .header { display:flex; align-items:center; margin-bottom:20px; gap:10px; }
    .header input { flex:1; padding:12px; background:#1a1a2e; border:1px solid #333; border-radius:10px; color:#b983ff; outline:none; }
    .card { background:#1a1a2e; border:1px solid #333; border-radius:15px; padding:20px; margin-bottom:20px; box-shadow:0 0 15px rgba(168,85,247,0.2); }
    .card-title { display:flex; align-items:center; gap:8px; font-size:18px; margin-bottom:15px; }
    .input-group { margin-bottom:15px; }
    .input-group label { font-size:12px; color:#b983ff; margin-bottom:5px; display:block; }
    .input-box { display:flex; align-items:center; background:#0d0d1a; border:1px solid #333; border-radius:10px; padding:12px; gap:10px; }
    .input-box input, .input-box select { background:none; border:none; outline:none; color:#fff; width:100%; font-size:15px; }
    .btn { width:100%; padding:14px; border:none; border-radius:10px; font-size:15px; font-weight:bold; cursor:pointer; }
    .btn-delete { background:#ff4d4d; color:#fff; margin-bottom:20px; }
    .btn-create { background:linear-gradient(90deg,#7c3aed,#a855f7); color:#fff; box-shadow:0 0 15px #a855f7; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; }
    .modal.active { display:flex; }
    .modal-content { background:#1a1a2e; border:1px solid #333; border-radius:15px; padding:25px; width:85%; max-width:320px; text-align:center; }
    .modal-btn { padding:10px 30px; border:none; border-radius:8px; background:#a855f7; color:#fff; font-weight:bold; }
</style>
</head>
<body>

<div class="header">
    <input type="text" placeholder="Username Target">
</div>

<button class="btn btn-delete">🗑️ DELETE ACCOUNT</button>

<div class="card">
    <div class="card-title">👤 CREATE ACCOUNT</div>

    <div class="input-group">
        <label>Username</label>
        <div class="input-box"><input type="text" id="username" placeholder="766852"></div>
    </div>

    <div class="input-group">
        <label>Password</label>
        <div class="input-box"><input type="password" id="password" placeholder="766852"></div>
    </div>

    <div class="input-group">
        <label>Durasi (Hari)</label>
        <div class="input-box"><input type="number" id="durasi" placeholder="999"></div>
    </div>

    <div class="input-group">
        <div class="input-box">
            <select id="role"><option>ADMIN</option><option>MEMBER</option></select>
        </div>
    </div>

    <button class="btn btn-create" onclick="createAccount()">CREATE ACCOUNT</button>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>ℹ️ Sukses</h3>
        <p id="modal-text">Akun berhasil dibuat sebagai ADMIN.</p>
        <button class="modal-btn" onclick="closeModal()">OK</button>
    </div>
</div>

<script>
function createAccount() {
    let role = document.getElementById('role').value;
    document.getElementById('modal-text').innerText = `Akun berhasil dibuat sebagai ${role}.`;
    document.getElementById('modal').classList.add('active');
}
function closeModal() { document.getElementById('modal').classList.remove('active'); }
</script>

</body>
</html>
